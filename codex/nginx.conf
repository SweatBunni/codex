server {
    listen 80;
    server_name your-domain.com www.your-domain.com;  # replace with your domain or IP

    # Redirect HTTP to HTTPS (uncomment after setting up SSL with certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Required for streaming AI responses
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Do NOT use a separate `location /_next/static/` unless `alias` points at the
    # exact folder that contains your *built* chunks (same machine/path as `next build`).
    # A wrong path = every CSS/JS 404 = unstyled HTML (plain Times New Roman).
    # Recommended: proxy everything to Node (above); standalone serves `/_next/static`
    # from `.next/standalone/.next/static/` after `npm run build` (post-copy script).
}

