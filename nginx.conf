server {
    listen 80;
    server_name your-domain.com www.your-domain.com;  # replace with your domain or IP

    # Redirect HTTP to HTTPS (uncomment after setting up SSL with certbot)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Required for streaming AI responses
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve Next.js static assets directly (faster)
    location /_next/static/ {
        alias /var/www/codexmc/.next/static/;  # adjust path
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

